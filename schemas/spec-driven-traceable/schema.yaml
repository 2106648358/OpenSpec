name: spec-driven-traceable
version: 1
description: Spec-driven workflow with capability markers and spec-code traceability
artifacts:
  - id: proposal
    generates: proposal.md
    description: Initial proposal document outlining the change
    template: proposal.md
    instruction: |
      Create the proposal document that establishes WHY this change is needed.

      Capability markers are REQUIRED in change metadata when this schema is used.
      MUST include ALL of the following that apply:
      - provides: capabilities ADDED or MODIFIED by this change (use hierarchical area/sub-area format)
      - requires: capabilities depended on but not modified
      - touches: adjacent capabilities touched without ownership
      - dependsOn: explicit change ordering dependencies

      Capability ID RULES:
      - MUST use hierarchical lowercase format: <area> or <area>/<sub-area>
      - <area> MUST correspond to an existing or new directory under openspec/specs/<area>/
      - Hyphen-separated segments only
      - Do NOT invent flat IDs that don't match the spec directory structure
    requires: []

  - id: specs
    generates: "specs/**/*.md"
    description: Detailed specifications for the change
    template: spec.md
    instruction: |
      Create specification files that define WHAT the system should do.

      Create one spec file per capability listed in the proposal's Capabilities section.
      Use delta sections: ADDED, MODIFIED, REMOVED, or RENAMED Requirements.
      Every requirement must have at least one scenario.
    requires:
      - proposal

  - id: design
    generates: design.md
    description: Technical design document with implementation details
    template: design.md
    instruction: |
      Create the design document that explains HOW to implement the change.

      Include the traceability strategy for each capability in provides and touches.
    requires:
      - proposal

  - id: tasks
    generates: tasks.md
    description: Implementation checklist with trackable tasks
    template: tasks.md
    instruction: |
      Create the task list that breaks down the implementation work.

      Tasks must use checkbox format. The FINAL task MUST be creating tasks/traceability.json
      after code implementation is complete. The traceability.json MUST use the EXACT format
      from the traceability template — no extra fields, correct data types.
    requires:
      - specs
      - design

  - id: apply
    generates: apply.md
    description: Implementation phase - work through tasks.md and implement the change
    template: apply.md
    instruction: |
      Work through the tasks in tasks.md, marking each as complete.

      When ALL tasks are done (code written, tested, working), the traceability artifact
      will be generated automatically to record the actual spec-code mappings.
    requires:
      - tasks

  - id: traceability
    generates: tasks/traceability.json
    description: Per-change spec-code traceability mappings
    template: traceability.md
    instruction: |
      Create tasks/traceability.json AFTER ALL IMPLEMENTATION TASKS ARE COMPLETE (code written, tested, working).

      Do NOT create traceability.json immediately after creating tasks.md. The task list in tasks.md
      is a plan; traceability.json records the ACTUAL code locations that implement each requirement.
      You can only know the real symbols/files/lines after the code changes are made and verified.

      CRITICAL format rules (deviation causes archive failure):
      - mappings MUST be an array, NOT an object grouped by type
      - Each mapping MUST have: capability (hierarchical), requirement, type, codeLocations
      - codeLocations MUST be array of {file, symbol} objects, NOT flat files array
      - symbol MUST be the enclosing function/method name, NOT class name
      - type MUST be "provides" or "touch" only — matching .openspec.yaml markers
      - NO requires mappings in traceability.json (requires is metadata-only)
      - DO NOT add extra fields: no schema, artifacts, implementation, description, tasks
    requires:
      - apply

apply:
  requires: [tasks]
  tracks: tasks.md
  instruction: |
    Read context files, work through pending tasks, mark complete as you go.
    When implementation is complete, create tasks/traceability.json with the EXACT
    format from the traceability template. Deviations from the format will cause
    archive to fail. Pay special attention to:
    - mappings is an ARRAY, not grouped by type
    - codeLocations uses {file, symbol} objects, not flat files array
    - symbol is the function/method name (NOT class name)
    - Capability IDs use hierarchical area/sub-area format
    - No extra fields beyond the template
